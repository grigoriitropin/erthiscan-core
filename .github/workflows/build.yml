name: Build, Push and Deploy

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Github Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/grigoriitropin/erthiscan-core:${{ github.sha }}
      - name: Generate bot token
        id: generate-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.BOT_APP_ID }}
          private-key: ${{ secrets.BOT_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: "erthiscan-infra"
      - name: Checkout Infra Repository
        uses: actions/checkout@v4
        with:
          repository: grigoriitropin/erthiscan-infra
          path: erthiscan-infra
          token: ${{ steps.generate-token.outputs.token }}
      - name: Update Image Tag in Infra and Push
        run: |
          cd erthiscan-infra/k8s
          
          kustomize edit set image ghcr.io/grigoriitropin/erthiscan-core=ghcr.io/grigoriitropin/erthiscan-core:${{ github.sha }}
          
          git config user.name "erthiscan-updater[bot]"
          git config user.email "erthiscan-updater[bot]@users.noreply.github.com"
          
          git add kustomization.yaml
          git commit -m "chore: update erthiscan-core image to ${{ github.sha }}"
          git push origin main
